  <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zombie Survival 2D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="rotateOverlay">
        <div class="rotate-content">
            <span class="rotate-icon">🔄</span>
            <h2>Landscape Mode Required</h2>
            <p>Please rotate your device horizontally to play!</p>
        </div>
    </div>

    <div id="hud">
        <div id="hpDisplay">HP: 100/100</div>
        <div id="ammoDisplay">Ammo: 10/10</div>
        <div id="highScoreDisplay" style="color: #ffd700; font-size: 16px; margin-top: 5px;">Best Wave: 1</div>
        <div id="waveDisplay">Wave: 1</div>
        <div id="ammoPowerup" class="powerup-active hidden">Infinite Ammo!</div>
        <div id="shieldPowerup" class="powerup-active hidden">Shield: 0s</div>
        <div id="speedPowerup" class="powerup-active hidden">Speed Boost!</div>
    </div>

    <div id="startScreen" class="overlay">
        <h1>ANOTHER ZOMBIE</h1>
        <p>WASD: Move | SPACE: Fire | G: Reload</p>
        <button id="startBtn">Start Game</button>
    </div>

    <div id="endScreen" class="overlay hidden">
        <h1 id="endTitle">Game Over</h1>
        <button id="restartBtn">Restart Game</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="touchControls">
        <div class="d-pad">
            <div class="btn" id="btnW">W</div>
            <div class="d-pad-row">
                <div class="btn" id="btnA">A</div>
                <div class="btn" id="btnS">S</div>
                <div class="btn" id="btnD">D</div>
            </div>
        </div>
        <div class="action-buttons">
            <div class="btn btn-action" id="btnReload">RELOAD</div>
            <div class="btn btn-action" id="btnFire">FIRE</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
